version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: chat_mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: chat_crm
    networks:
      - chat_network

  redis:
    image: redis:7-alpine
    container_name: chat_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - chat_network

volumes:
  mongodb_data:
  redis_data:

networks:
  chat_network:
    driver: bridge
